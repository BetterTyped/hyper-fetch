name: HyperFlow Release

# Trigger: `workflow_dispatch` only (manual from Actions, or automation that calls the dispatch API).
#
# Integration with `workflow.yml`: that workflow’s `release` job sets job output `released` when semantic-release
# creates a new tag (`true` / `false`). This workflow does not read `released` — callers must gate dispatch on it
# in `workflow.yml` (e.g. a job with `if: needs.release.outputs.released == 'true'` before calling the dispatch API).
# When extending triggers or inputs, thread / validate that `released` state explicitly; ensure `GITHUB_TOKEN`
# workflow permissions allow dispatch where automation is used.

# Pipeline: install deps → `pnpm build` → `hyper-flow:make:app` → `hyper-flow:publish:app`

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: hyper-flow-${{ github.sha }}
  cancel-in-progress: false

jobs:
  verify-branch:
    name: Verify branch
    runs-on: ubuntu-latest
    steps:
      - name: Require main
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
            echo "::error::HyperFlow Release must run from main (got ${GITHUB_REF})"
            exit 1
          fi

  publish_on_win:
    name: Publish HyperFlow on Windows
    needs: verify-branch
    runs-on: windows-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.3"
          cache: "pnpm"
      - name: Restore node_modules
        uses: actions/cache/restore@v3
        id: cache-node-modules
        with:
          path: |
            **/node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
      - name: Install node_modules on cache miss
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile
      - name: Cache node_modules
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        uses: actions/cache/save@v3
        with:
          path: |
            '**/node_modules'
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
      - name: Build monorepo packages
        run: pnpm build
      - name: Build native installers (electron-forge make)
        run: pnpm nx run hyper-flow:make:app
        env:
          NODE_ENV: production
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          SIGN_ID: ${{ secrets.SIGN_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_ENVIRONMENT: "production"
          VITE_PUBLIC_POSTHOG_HOST: ${{ secrets.POSTHOG_HOST }}
          VITE_PUBLIC_POSTHOG_KEY: ${{ secrets.POSTHOG_KEY }}
          VITE_SENTRY_DNS: ${{ secrets.SENTRY_DNS }}
          VITE_SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      - name: Publish native apps
        run: pnpm nx run hyper-flow:publish:app
        env:
          NODE_ENV: production
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          SIGN_ID: ${{ secrets.SIGN_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_ENVIRONMENT: "production"
          VITE_PUBLIC_POSTHOG_HOST: ${{ secrets.POSTHOG_HOST }}
          VITE_PUBLIC_POSTHOG_KEY: ${{ secrets.POSTHOG_KEY }}
          VITE_SENTRY_DNS: ${{ secrets.SENTRY_DNS }}
          VITE_SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

  publish_on_linux:
    name: Publish HyperFlow on Linux
    needs: verify-branch
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.3"
          cache: "pnpm"
      - name: Restore node_modules
        uses: actions/cache/restore@v3
        id: cache-node-modules
        with:
          path: |
            **/node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
      - name: Install node_modules on cache miss
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile
      - name: Cache node_modules
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        uses: actions/cache/save@v3
        with:
          path: |
            '**/node_modules'
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
      - name: Build monorepo packages
        run: pnpm build
      - name: Build native installers (electron-forge make)
        run: pnpm nx run hyper-flow:make:app
        env:
          NODE_ENV: production
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          SIGN_ID: ${{ secrets.SIGN_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_ENVIRONMENT: "production"
          VITE_PUBLIC_POSTHOG_HOST: ${{ secrets.POSTHOG_HOST }}
          VITE_PUBLIC_POSTHOG_KEY: ${{ secrets.POSTHOG_KEY }}
          VITE_SENTRY_DNS: ${{ secrets.SENTRY_DNS }}
          VITE_SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      - name: Publish native apps
        run: pnpm nx run hyper-flow:publish:app
        env:
          NODE_ENV: production
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          SIGN_ID: ${{ secrets.SIGN_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_ENVIRONMENT: "production"
          VITE_PUBLIC_POSTHOG_HOST: ${{ secrets.POSTHOG_HOST }}
          VITE_PUBLIC_POSTHOG_KEY: ${{ secrets.POSTHOG_KEY }}
          VITE_SENTRY_DNS: ${{ secrets.SENTRY_DNS }}
          VITE_SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

  publish_on_mac:
    name: Publish HyperFlow on Mac
    needs: verify-branch
    runs-on: macos-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.3"
          cache: "pnpm"
      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Import codesign certs
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPSTORE_CERTIFICATES_FILE_BASE64 }}
          p12-password: ${{ secrets.APPSTORE_CERTIFICATES_PASSWORD }}
      - name: Restore node_modules
        uses: actions/cache/restore@v3
        id: cache-node-modules
        with:
          path: |
            **/node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
      - name: Install node_modules on cache miss
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile
      - name: Install macos-alias
        run: pnpm add macos-alias@0.2.12 -w
      - name: Rebuild native modules
        run: |
          npm install -g node-gyp
          npm rebuild
          pnpm install --frozen-lockfile
      - name: Cache node_modules
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        uses: actions/cache/save@v3
        with:
          path: |
            '**/node_modules'
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
      - name: Build monorepo packages
        run: pnpm build
      - name: Build native installers (electron-forge make)
        run: pnpm nx run hyper-flow:make:app
        env:
          NODE_ENV: production
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          SIGN_ID: ${{ secrets.SIGN_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_ENVIRONMENT: "production"
          VITE_PUBLIC_POSTHOG_HOST: ${{ secrets.POSTHOG_HOST }}
          VITE_PUBLIC_POSTHOG_KEY: ${{ secrets.POSTHOG_KEY }}
          VITE_SENTRY_DNS: ${{ secrets.SENTRY_DNS }}
          VITE_SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      - name: Publish native apps
        run: pnpm nx run hyper-flow:publish:app
        env:
          NODE_ENV: production
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          SIGN_ID: ${{ secrets.SIGN_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_ENVIRONMENT: "production"
          VITE_PUBLIC_POSTHOG_HOST: ${{ secrets.POSTHOG_HOST }}
          VITE_PUBLIC_POSTHOG_KEY: ${{ secrets.POSTHOG_KEY }}
          VITE_SENTRY_DNS: ${{ secrets.SENTRY_DNS }}
          VITE_SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
